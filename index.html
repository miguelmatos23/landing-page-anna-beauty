<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <title>Anna Beauty - Lash Design</title>
  </head>
  <body style="background-color: #0A0908; margin: 0; padding: 0;">
    <div id="root">
      <!-- Instant HTML Splash Screen to prevent white flash -->
      <div id="instant-loader" style="position: fixed; inset: 0; background-color: #0A0908; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-family: 'Playfair Display', serif;">
        <div style="position: absolute; width: 400px; height: 400px; background-color: rgba(212,175,55,0.05); border-radius: 50%; filter: blur(100px);"></div>
        <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; text-align: center; color: white;">
          <span style="font-size: 32px; letter-spacing: 0.25em; font-weight: bold; font-family: 'Playfair Display', serif;">ANNA</span>
          <span style="font-size: 24px; font-style: italic; color: #F3E5AB; margin-top: -4px; font-family: 'Playfair Display', serif;">Beauty</span>
        </div>
        <div style="width: 192px; height: 2px; background-color: rgba(255,255,255,0.05); border-radius: 9999px; overflow: hidden;">
          <div style="width: 30%; height: 100%; background: linear-gradient(to right, #F3E5AB, #D4AF37, #F3E5AB); animation: instant-pulse 1.5s infinite ease-in-out;"></div>
        </div>
      </div>
      <style>
        @keyframes instant-pulse {
          0% { width: 0%; margin-left: 0%; }
          50% { width: 50%; margin-left: 25%; }
          100% { width: 0%; margin-left: 100%; }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
